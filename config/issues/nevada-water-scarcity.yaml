# Phase 2 Community Conversation proposals (June-July 2026), used by the
# pipeline to cross-reference citizen proposals against legislative history.
# Source: "NV Phase 2 Constituent - View Legislators" handout.
constituent_proposals:
  - id: desalination-new-supply
    title: "Develop new supply via desalination"
    detail: >-
      Partner with Arizona/Mexico for a Sea of Cortez pipeline, or fund
      California desalination in exchange for Colorado River allotment.
    frequency: "High: 5 of 7 community conversations"
    consensus: >-
      Mixed: broad agreement more supply is needed; divergence on whether
      desalination is realistic and cost-effective.
    tradeoffs: >-
      Cost and feasibility at scale; brine disposal; requires interstate and
      international cooperation, possibly beyond state authority.
    match_terms: [desalination, "sea of cortez", "water importation", "interbasin"]
  - id: interstate-pipeline-federal
    title: "Build an interstate water pipeline / declare a national water emergency"
    detail: >-
      A federal project modeled on Hoover Dam, TVA, and the Interstate
      Highway System.
    frequency: "High: brought up in most community conversations"
    consensus: >-
      Mixed: broad agreement Nevada has a supply problem; divergence on how
      to address it.
    tradeoffs: >-
      Largely outside state legislative scope; requires federal action and
      cooperation from other states.
    match_terms: ["water pipeline", "interstate water", importation, congress, federal]
  - id: regulate-data-centers
    title: "Regulate data centers"
    detail: >-
      Require closed-loop cooling and self-sufficient power; prohibit open
      evaporative cooling. Participants broadly agreed data centers should
      "pay their own way."
    frequency: "High: data center water usage was a major concern across conversations"
    consensus: "High: broad agreement that data centers should pay their own way."
    tradeoffs: >-
      Technical feasibility and environmental impact of closed-loop systems;
      disagreement over whether data centers should be banned or are "a
      necessary evil."
    match_terms: ["data center", "data centers", colocation, "evaporative cooling",
                  "closed-loop", server]

