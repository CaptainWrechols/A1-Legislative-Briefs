# The Forum visual tokens for citizen legislative briefs.
# Primary source: nvforum.org public site CSS (Breakdance / brand palette).
# If a Phase 2 Issue Brief PDF/DOCX is added under templates/phase-2-samples/,
# design-packager MUST prefer that sample's colors/fonts over this file.

organization: "The Nevada Forum"
tagline: "Our future. One table. Everyone gets a seat."

colors:
  background: "#F2F0ED"      # warm paper / page ground
  ink: "#1A1A1F"             # near-black body text
  accent_purple: "#8659B5"  # primary brand accent / headers / rules
  accent_purple_dark: "#7448A3"
  accent_gold: "#FFBF3F"    # highlight / callout bar / key numbers
  white: "#FFFFFF"
  muted: "#5C5C66"          # secondary text
  rule: "#D9D4CC"           # light dividers on cream

typography:
  display: "Bebas Neue"           # short titles / section labels (all caps OK)
  serif_body: "Libre Baskerville" # body prose for print
  # Typekit kit used on nvforum.org (fallback if licensed fonts unavailable):
  typekit_kit: "ooi8cab"
  google_fonts_url: "https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
  body_size_pt: 11
  title_size_pt: 22
  section_label_size_pt: 14
  explainer_size_pt: 10
  line_height: 1.35

page:
  size: "letter"            # US Letter
  margin_in: 0.6
  max_front_pages: 2
  page1_must_carry: "most important deliberation content"
  page2_allowed: "spillover + people signals + data limits"

print_notes:
  - "Design for Print → Save as PDF from HTML (or Word export)."
  - "Keep page 1 self-contained: a citizen should grasp the political map without page 2."
  - "Do not invent Phase 2 layout grids; mirror brand colors/fonts. Prefer an official Phase 2 sample when provided."
