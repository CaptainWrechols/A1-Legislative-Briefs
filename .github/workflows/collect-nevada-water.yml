name: Collect Nevada Water Bills

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: "Set true to ignore cache and re-collect Pass 1"
        required: false
        default: "false"
      skip_openstates:
        description: "Set true for NELIS-only Pass 1"
        required: false
        default: "false"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pass 1 — bills, titles, abstracts (cached)
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.refresh }}" = "true" ]; then ARGS="$ARGS --refresh"; fi
          if [ "${{ inputs.skip_openstates }}" = "true" ]; then ARGS="$ARGS --skip-openstates"; fi
          python collectors/pass1_bills.py $ARGS

      - name: Upload Pass 1 data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nevada-water-pass1
          path: sources/nevada/water-scarcity/pass1/
          if-no-files-found: warn
