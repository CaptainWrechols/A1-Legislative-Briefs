name: Collect Nevada Water Bills

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: "Set true to ignore Pass 1 / abstract caches"
        required: false
        default: "false"
      skip_openstates:
        description: "Set true for NELIS-only Pass 1"
        required: false
        default: "false"
      skip_abstracts:
        description: "Set true to skip full-digest enrichment"
        required: false
        default: "false"
      skip_pass2:
        description: "Set true to skip Pass 2 vote/progress enrichment"
        required: false
        default: "false"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pass 1 — bills + titles (cached)
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.refresh }}" = "true" ]; then ARGS="$ARGS --refresh"; fi
          if [ "${{ inputs.skip_openstates }}" = "true" ]; then ARGS="$ARGS --skip-openstates"; fi
          python collectors/pass1_bills.py $ARGS

      - name: Pass 1b — full NELIS digests for those bills only
        if: ${{ inputs.skip_abstracts != 'true' }}
        run: |
          ARGS=""
          if [ "${{ inputs.refresh }}" = "true" ]; then ARGS="$ARGS --refresh"; fi
          python collectors/enrich_abstracts.py $ARGS

      - name: Pass 2 — votes, actions, progress (known bills only)
        if: ${{ inputs.skip_pass2 != 'true' }}
        run: |
          ARGS="--skip-openstates"
          if [ "${{ inputs.refresh }}" = "true" ]; then ARGS="$ARGS --refresh"; fi
          python collectors/pass2_bills.py $ARGS

      - name: Pass 2b — legislator party roster + attach to roll calls
        if: ${{ inputs.skip_pass2 != 'true' }}
        run: |
          ARGS=""
          if [ "${{ inputs.refresh }}" = "true" ]; then ARGS="$ARGS --refresh"; fi
          python collectors/pass2_party_roster.py $ARGS --skip-ballotpedia
          python collectors/pass2_attach_party.py
          python collectors/export_pass2_readable.py

      - name: Upload Pass 1 data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nevada-water-pass1
          path: sources/nevada/water-scarcity/pass1/
          if-no-files-found: warn

      - name: Upload Pass 2 data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nevada-water-pass2
          path: |
            sources/nevada/water-scarcity/pass2/
            sources/nevada/water-scarcity/processed/
          if-no-files-found: warn
