name: Diagnose OpenStates Nevada

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OpenStates diagnostic
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python collectors/diagnose_openstates.py

      - name: Run OpenStates collector (fetch-all strategy)
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python collectors/openstates_bills.py

      - name: Upload diagnostic and collection artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openstates-nevada-diagnostic
          path: |
            sources/nevada/water-scarcity/verification/openstates-diagnostic.json
            sources/nevada/water-scarcity/verification/openstates-diagnostic.txt
            sources/nevada/water-scarcity/manifest.json
            sources/nevada/water-scarcity/processed/bills-combined.json
